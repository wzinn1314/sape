<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="brand">
      <div class="logo"><img src="../assent/logo.png" alt="logo-ete "></div>
      <div>
        <h1 class="school-name">Sistema Escolar</h1>
        <p class="school-tag">Área de acesso do usuário</p>
      </div>
    </div>

    <nav>
      <a href="#">Início</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <main class="login-container">
    <section class="login-card">
      <h2>Entrar na conta</h2>
      <p class="login-subtitle">Digite seus dados para acessar o sistema</p>

      <form id="loginForm">
        <label for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          placeholder="Digite seu e-mail" 
          required
        />

        <label for="password">Senha</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Digite sua senha" 
          required
        />

        <button type="submit">Entrar</button>
      </form>

      <p id="message"></p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
