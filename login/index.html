<!DOCTYPE html>
<html lang="pt-BR">
<!-- login/index.html — Entrada no sistema (e-mail e senha). Cabeçalho via header.js. -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../assets/foto.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../styles.css" />
  <script src="../header.js" defer></script>
  <title>Login - SAPE</title>
</head>
<body>
  <main id="conteudo" class="login-page">
    <section class="login-card" aria-labelledby="login-title">
      <header class="login-header">
        <p class="small-title">Acesso</p>
        <h1 id="login-title">Entrar</h1>
        <p>Use o e-mail e a senha cadastrados para acessar o sistema.</p>
      </header>

      <form id="loginForm" action="#" method="post" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit">Entrar</button>
      </form>

      <p id="message" class="login-message" role="status" aria-live="polite"></p>
      <p class="login-footer">
        Não tem conta?
        <a href="../register/index.html">Cadastre-se</a>
      </p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
