<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Relatório | SAPE</title>
    <link rel="icon" href="../assets/foto.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <!-- Seus estilos globais -->
</head>
<body>

<main class="main-container">

    
    <header class="top-header">
        <div class="header-left">
            <div class="header-icon report-color">
               
            </div>
            <div class="header-titles">
                <h1>Gerar Relatório</h1>
                <p>Crie documentos oficiais e salve diretamente no prontuário do aluno.</p>
            </div>
       
    </header>

    <!-- ================= FORMULÁRIO ESTILIZADO ================= -->
    <section class="form-container-card">
        <form id="reportForm" class="animated-fade-up">
            
            <div class="form-section-title">
                <span class="step-badge">1</span>
                <h3>Informações Básicas</h3>
            </div>

            <div class="input-grid">
                <!-- Seleção de Aluno com Ícone -->
                <div class="input-group">
                    <label for="aluno_id">Alunos</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user-graduate input-icon"></i>
                        <select id="aluno_id" required>
                            <option value="" disabled selected>Selecione um aluno da lista...</option>
                            <!-- JS popula aqui -->
                        </select>
                    </div>
                </div>

                <!-- Data de Referência -->
                <div class="input-group">
                    <label for="data_relatorio">Data de Emissão</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-calendar-alt input-icon"></i>
                        <input type="date" id="data_relatorio" required>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="titulo">Título do Documento</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-pen-nib input-icon"></i>
                    <input type="text" id="titulo" placeholder="Ex: Relatório Semestral de Acompanhamento PEI" required>
                </div>
            </div>

            <div class="form-section-title" style="margin-top: 2rem;">
                <span class="step-badge purple">2</span>
                <h3>Conteúdo do Relatório</h3>
            </div>

            <div class="input-group">
                <label for="conteudo">Descrição Detalhada</label>
                <textarea id="conteudo" rows="12" placeholder="Escreva aqui as observações pedagógicas, evolução e necessidades do aluno..." required></textarea>
                <small class="helper-text">O texto acima será formatado automaticamente no papel timbrado da escola.</small>
            </div>

            <!-- Botões de Ação -->
            <div class="form-footer">
                <button type="reset" class="btn-clear">
                    <i class="fa-solid fa-eraser"></i> Limpar Tudo
                </button>
                <button type="submit" class="btn-generate" id="btnSubmit">
                    <span>Gerar PDF Oficial</span>
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </button>
            </div>

        </form>
    </section>

    <footer class="footer">
        <i class="fa-solid fa-shield-halved"></i>
        Sistema SAPE • Gerencie seus relatórios com segurança e praticidade.
    </footer>

</main>

<script src="script.js"></script>

</body>
</html>
