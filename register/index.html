<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/foto.png">
  <link rel="stylesheet" href="styles.css">
  <title>Cadastro - SAPE</title>
</head>
<body>

  <main class="register-page">

    <div class="puzzle puzzle-red"></div>
    <div class="puzzle puzzle-blue"></div>
    <div class="puzzle puzzle-yellow"></div>
    <div class="puzzle puzzle-green"></div>

    <section class="register-card">

      <div class="register-header">
        <h1>Crie sua conta</h1>
        <p>
          Faça o seu cadastro para acessar o sistema e conhecer conteúdos
          sobre neurodiversidade, inclusão e respeito.
        </p>
      </div>

      <form id="registerForm" action="#" method="post">

        <div class="form-group">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" autocomplete="name" placeholder="Digite seu nome completo" required>
        </div>

        <div class="form-group">
          <label for="email">Email educacional</label>
          <input type="email" id="email" name="email" autocomplete="email" placeholder="Digite seu email" required>
        </div>

        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" autocomplete="off" maxlength="11" placeholder="Digite seu CPF" required>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="new-password" placeholder="Digite sua senha" required>
        </div>

        <div class="form-group">
          <label for="confirmar-senha">Confirmar senha</label>
          <input type="password" id="confirmar-senha" name="confirmar-senha" autocomplete="new-password" placeholder="Confirme sua senha" required>
        </div>

        <div class="form-group">
          <label for="role">Você é</label>
          <select id="role" name="role" required>
            <option value="">Selecione...</option>
            <option value="Professor">Professor(a)</option>
            <option value="Aluno">Aluno</option>
          </select>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="aceito-termos" name="aceito-termos" required>
          <label for="aceito-termos">
            Aceito os <a href="#">Termos de Uso</a> e a 
            <a href="#">Política de Privacidade</a>
          </label>
        </div>

        <p id="loading" style="display: none;">Cadastrando usuário...</p>
        <p id="message"></p>

        <button type="submit" id="registrar-btn" class="button-link disabled" disabled>
          Registrar
        </button>

        <p class="note">
          Todos os campos devem ser preenchidos corretamente para liberar o botão.
        </p>

      </form>

      <p class="login-link">
        Já tem uma conta? <a href="../login/index.html">Entrar</a>
      </p>

    </section>
  </main>

  <script src="register.js"></script>
</body>
</html>
