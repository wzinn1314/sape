<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assent/foto.png">
    <link rel="stylesheet" href="styles.css">
    <title>Cadastro - SAPE</title>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <div class="logo"><img src="../assent/logo.png" alt="Logo da Escola"></div>
            <div>
                <p class="school-name">Sistema de Suporte à Atenção Psicopedagógica Estudantil</p>
            </div>
        </div>
        <div class="nav-and-login">
            <a href="../index.html" class="school-logo-button">Voltar</a>
        </div>
    </header>

    <main class="register-page">
        <section class="register-card">
            <div class="register-header">
                <p class="small-title">Novo cadastro</p>
                <h1>Crie sua conta</h1>
                <p>Faça o seu cadastro para acessar o sistema e conhecer conteúdos sobre neurodiversidade.</p>
            </div>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" name="cpf" autocomplete="off" maxlength="11" required>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" autocomplete="tel">
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="confirmar-senha">Confirmar senha</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" autocomplete="new-password" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="aceito-termos" name="aceito-termos" required>
                    <label for="aceito-termos">Aceito os <a href="#">Termos de Uso</a> e a <a href="#">Política de Privacidade</a></label>
                </div>

                <a id="registrar-btn" class="button-link disabled" aria-disabled="true">Registrar</a>
                <p class="note">Todos os campos devem ser preenchidos corretamente para liberar o botão.</p>
            </form>
        </section>
    </main>

    <script src="register.js"></script>
</body>
</html>
