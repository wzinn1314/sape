<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - Gestão AEE</title>
    <link rel="stylesheet" href="style.css">
    <script src="admin.js" defer></script>
</head>
<body>
    <main class="page-shell">
        <section class="registration-panel">
            <header class="panel-header">
                <div>
                    <span class="eyebrow">Área Administrativa</span>
                    <h1>Gestão de Professores e Vínculos AEE</h1>
                </div>
            </header>

            <!-- 1. CADASTRO DE PROFESSOR -->
            <div class="section-card">
                <div class="section-heading">
                    <strong>1. Cadastrar Novo Professor de AEE</strong>
                </div>
                <form id="profForm" class="registration-form">
                    <div class="form-grid form-grid-2">
                        <label class="field">
                            <span>Nome do Professor</span>
                            <input type="text" id="profNome" placeholder="Ex: Profa. Maria Clara" required />
                        </label>
                        <label class="field">
                            <span>E-mail Institucional</span>
                            <input type="email" id="profEmail" placeholder="maria@escola.edu.br" required />
                        </label>
                        <label class="field">
                            <span>Matrícula Funcional</span>
                            <input type="text" id="profMatricula" placeholder="PROF-2026-01" required />
                        </label>
                        
                        <!-- NOVO CAMPO: SENHA INICIAL -->
                        <label class="field">
                            <span>Senha Acesso Inicial</span>
                            <input type="password" id="profSenha" placeholder="Crie uma senha provisória" required minlength="4" />
                        </label>

                        <label class="field">
                            <span>Especialização</span>
                            <select id="profEspecializacao">
                                <option value="Psicopedagogia">Psicopedagogia</option>
                                <option value="Educação Inclusiva">Educação Inclusiva</option>
                                <option value="Libras / Braille">Libras / Braille</option>
                                <option value="Neuropedagogia">Neuropedagogia</option>
                            </select>
                        </label>
                    </div>
                    <div class="buttons-row" style="margin-top: 15px;">
                        <button type="submit" class="btn-primary">Cadastrar Professor</button>
                    </div>
                </form>
            </div>

            <!-- 2. VÍNCULO PROFESSOR -> ALUNOS -->
            <div class="section-card">
                <div class="section-heading">
                    <strong>2. Vincular Professor a Alunos</strong>
                </div>
                <form id="vinculoForm" class="registration-form">
                    <div class="form-grid form-grid-2">
                        <!-- Selecionar Professor -->
                        <label class="field">
                            <span>Selecione o Professor</span>
                            <select id="selectProfessor" required>
                                <option value="">-- Escolha um Professor --</option>
                            </select>
                        </label>

                        <!-- Selecionar Alunos (Multi-Select) -->
                        <label class="field">
                            <span>Selecione os Alunos Atendidos</span>
                            <div id="listaAlunosCheckboxes" class="checkbox-container">
                                <!-- Preenchido dinamicamente via JS -->
                            </div>
                        </label>
                    </div>
                    <div class="buttons-row" style="margin-top: 15px;">
                        <button type="submit" class="btn-primary">Salvar Vínculo</button>
                    </div>
                </form>
            </div>

            <!-- 3. TABELA DE CONSULTA DE VÍNCULOS -->
            <div class="section-card">
                <div class="section-heading">
                    <strong>3. Professores e Alunos Acompanhados</strong>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Professor</th>
                                <th>Matrícula</th>
                                <th>Especialização</th>
                                <th>Alunos Vinculados</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaVinculos">
                            <!-- Preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>
</body>
</html>
